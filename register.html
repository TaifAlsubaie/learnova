<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register - Learnova</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style/style.css">
</head>
<body>

  <!-- NAVBAR -->
   <header class="navbar">
    <div class="container">
      <div class="logo">Learnova</div>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="courses.html">Courses</a>
        <a href="about.html">about</a>
        <a href="contact.html">Contact</a>
        <a href="login.html" class="icon-link" aria-label="Login" title="Login">
            <a href="login.html" class="icon-link" aria-label="Login" title="Login">
  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
       stroke-linecap="round" stroke-linejoin="round">
    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
    <circle cx="12" cy="7" r="4"/>
  </svg>
</a> 
      </nav>
    </div>
  </header>

  <!-- PAGE -->
  <main class="container auth-page">
    <div class="auth-card">
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-subtitle">Join Learnova and start learning today.</p>

      <form class="auth-form" action="#" method="post">

        <div class="field">
          <label>Full Name</label>
          <input type="text" placeholder="Your full name" required>
        </div>

        <div class="field">
          <label>Email</label>
          <input type="email" placeholder="you@example.com" required>
        </div>

        <div class="field">
          <label>Password</label>
          <input type="password" placeholder="Create password" required>
        </div>

        <div class="field">
          <label>Confirm Password</label>
          <input type="password" placeholder="Confirm password" required>
        </div>

        <button type="submit" class="btn auth-btn">Register</button>

        <p class="auth-hint">
          Already have an account?
          <a href="login.html" class="auth-link">Sign In</a>
        </p>

      </form>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <p>© 2026 Learnova. All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
